title = "Height Bounds for Height-Balanced Trees"
date = 2026-07-07
topics = [
  "Computer science/Data structures",
]
abstract = """
<p>This article takes a fresh look at the class of binary trees known as <em>height-balanced trees</em>, where for each node, the height difference between the left and right subtree is bounded by some fixed integer $d > 0$. An interesting question from an algorithmic perspective is how bad the imbalance of such trees can be in the worst case. <a href=\"https://dx.doi.org/10.1109/TC.1976.5009208\">Luccio and Pagli</a> showed that the worst-case size of a tree of height $h$ is roughly $B_d\\cdot C_d^h$ for large $h$ for some specific real numbers $B_d, C_d > 1$.</p>
<p>This formalisation contains:</p>
<ul>
<li>A simpler proof that the worst-case size is at least $C_d ^ h$ for all $h$</li>
<li>An explicit closed-form expression for the worst-case size</li>
<li>A closed-form expression for $B_d$ in terms of $C_d$ and vice versa</li>
<li>Explicit bounds for $C_d$ in terms of $d$</li>
<li>Asymptotic expansions for $C_d$ and $B_d$ as $d\\to\\infty$</li>
</ul>"""
