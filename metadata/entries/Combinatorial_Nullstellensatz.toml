title = "Alon’s Combinatorial Nullstellensatz"
date = 2026-05-10
topics = [
  "Mathematics/Combinatorics",
]
abstract = "This entry formalizes Alon’s Combinatorial Nullstellensatz for sparse multivariate polynomials over fields. The proof derives the coefficient formula from univariate Lagrange interpolation and uses it to obtain the standard nonvanishing conclusion over finite grids. AI assistance was used for proof engineering. The final definitions, statements, and proofs are checked by Isabelle."
