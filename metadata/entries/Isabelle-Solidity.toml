[history]
2026-05-29 = """
The semantics was updated to be compliant with a more recent version of Solidity (v0.8.25).
In addition to external functions it now also supports internal functions.
In addition to the verification of invariants, it now also supports the verification of (multiple) pre/post-conditions for functions.
Type consistency is added as pre-condition for functions.
