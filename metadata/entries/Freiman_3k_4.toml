title = "Freiman's 3k - 4 Theorem"
date = 2026-06-02
topics = [
  "Mathematics/Combinatorics",
]
abstract = """
This entry formalizes Freiman's \\(3k - 4\\) theorem for finite sets of integers:
small doubling, in the range \\(|A + A| \\leq 3|A| - 4\\), forces containment in a
short arithmetic progression. AI assistance was used for proof engineering. The
final definitions, statements, and proofs are checked by Isabelle."""
